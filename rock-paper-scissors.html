<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Project: Rock, paper, scissors</title>
  <style>
    input {
      font-size: 2em;
      margin: 10px 1px 0;
    }
    h3 {
        margin:25px 0 0;
    }
  </style>
</head>
<body>
  <script>
      function computerPlay() {
          let choice = [
              "Rock",
              "Paper",
              "Scissors"
          ];
          return choice[Math.floor(Math.random()*choice.length)]
      }

      function playRound(playerSelection, computerSelection) {
        let win = "Hah! You win!";
        let tie = "Tie! Try again!";
        let loss = "Aw, you lose!";
        let statement = " You picked "  + playerSelection.toLowerCase() + " and the computer picked " + computerSelection.toLowerCase() + ".";
        if (playerSelection.toLowerCase() == computerSelection.toLowerCase()) {
            return tie + statement;
        }
        if (playerSelection.toLowerCase() == "scissors" && computerSelection.toLowerCase() == "paper") {
            return win + statement;
        }
        if (playerSelection.toLowerCase() == "scissors" && computerSelection.toLowerCase() == "rock") {
            return loss + statement;
        }
        if (playerSelection.toLowerCase() == "rock" && computerSelection.toLowerCase() == "scissors") {
            return win + statement;
        }
        if (playerSelection.toLowerCase() == "rock" && computerSelection.toLowerCase() == "paper") {
            return loss + statement;
        }
        if (playerSelection.toLowerCase() == "paper" && computerSelection.toLowerCase() == "rock") {
            return win + statement;
        }
        if (playerSelection.toLowerCase() == "paper" && computerSelection.toLowerCase() == "scissors") {
            return loss + statement;
        }
      }

      const playerSelection = prompt("Do you choose rock, paper, or scissors??");
      const computerSelection = computerPlay();
      console.log(playRound(playerSelection,computerSelection))
  </script>
</body>
</html>
