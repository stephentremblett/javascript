<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Project: Rock, paper, scissors</title>
  <style>
    input {
      font-size: 2em;
      margin: 10px 1px 0;
    }
    h3 {
        margin:25px 0 0;
    }
  </style>
</head>
<body>
  <script>
      function computerPlay() {
          let choice = [
              "Rock",
              "Paper",
              "Scissors"
          ];
          return choice[Math.floor(Math.random()*choice.length)]
      }

      function playRound(playerSelection, computerSelection) {
        playerSelection = playerSelection.toLowerCase();
        computerSelection = computerSelection.toLowerCase();
        const win = "Hah! You win!";
        const tie = "Tie! Try again!";
        const loss = "Aw, you lose!";
        let statement = " You picked "  + playerSelection + " and the computer picked " + computerSelection + ".";
        if (playerSelection == computerSelection) {
            return tie + statement;
        }
        if (playerSelection == "scissors" && computerSelection == "paper") {
            return win + statement;
        }
        if (playerSelection == "scissors" && computerSelection == "rock") {
            return loss + statement;
        }
        if (playerSelection == "rock" && computerSelection == "scissors") {
            return win + statement;
        }
        if (playerSelection == "rock" && computerSelection == "paper") {
            return loss + statement;
        }
        if (playerSelection == "paper" && computerSelection == "rock") {
            return win + statement;
        }
        if (playerSelection == "paper" && computerSelection == "scissors") {
            return loss + statement;
        }
        if (playerSelection !== "paper" || "rock" || "scissors") {
            return "Try typing again."
        }
      }

      const playerSelection = prompt("Do you choose rock, paper, or scissors??");
      const computerSelection = computerPlay();
      console.log(playRound(playerSelection,computerSelection))
  </script>
</body>
</html>
