<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Project: Rock, paper, scissors</title>
  <style>
    input {
      font-size: 2em;
      margin: 10px 1px 0;
    }
    h3 {
        margin:25px 0 0;
    }
  </style>
</head>
<body>
  <script>
      const win = "Hah! You win!";
      const tie = "Tie! Try again!";
      const loss = "Aw, you lose!";

      function computerPlay() {
          let choice = [
              "Rock",
              "Paper",
              "Scissors"
          ];
          return choice[Math.floor(Math.random()*choice.length)]
      }

      function playRound(playerSelection, computerSelection) {
        computerSelection = computerPlay()
        playerSelection = playerSelection.toLowerCase();
        computerSelection = computerSelection.toLowerCase();
        let statement = " You picked "  + playerSelection + " and the computer picked " + computerSelection + ".";
        if (playerSelection == computerSelection) {
            return tie + statement;
        }
        if (
            playerSelection == "scissors" && computerSelection == "paper" ||
            playerSelection == "rock" && computerSelection == "scissors" ||
            playerSelection == "paper" && computerSelection == "rock"
            ) {
            return win + statement;
        }
        if (
            playerSelection == "scissors" && computerSelection == "rock" ||
            playerSelection == "rock" && computerSelection == "paper" ||
            playerSelection == "paper" && computerSelection == "scissors"
            ) {
            return loss + statement;
        }
        if (playerSelection !== "paper" || "rock" || "scissors") {
            return "Try typing again."
        }
      }
      
      function game() {
          let playerPts = 0;
          let computerPts = 0;
          for (let i = 0; i < 5; i++) {
              let playerSelection = prompt("Choose: rock, paper, or scissors");
              let computerSelection = computerPlay();
              let results = playRound(playerSelection, computerSelection);
              console.log(results);
              if (results.indexOf("win") != -1 ){
                playerPts++;
              } else if (results.indexOf("lose") != -1 ) {
                computerPts++;
              }
          }
          let final = " The final score was Player: " + playerPts + " vs Computer: " + computerPts;
          if (playerPts > computerPts ) {
              console.log("Congratulations you win!" + final);
          } else if (playerPts < computerPts) {
              console.log("Unfortunately you have lost." + final);
          } else {
              console.log("Oh wow, it was a tie!" + final);
          }
      }
      
      console.log(game());
  </script>
</body>
</html>
