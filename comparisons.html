<!DOCTYPE html>
<html>
<head>
    <title>Javascript - Comparisons</title>
    <meta charset="UTF-8"/>
</head>
<body>
    <script>
        // Simple boolean
        // Simple conditionals:  >, <, ==, <=, >=
        let result = 5 > 4;
        console.log(result);

        // Logical operators
        // || (or), && (and), ! (not)
        if (1 || 2) {
            alert("Truth yo");
        }
        if (9 < 10 || 9 > 18){
            alert('Office is closed.');
        }
        // If all are false, returns last value
        alert(undefined || null || 0);
        // With &&, returns first false value (whereas || returns first truth value)
        alert(1 && 2);

        if (age < 14 && age > 90);
        if (age !> 14 && age !< 90);
    </script>
</body>
</html>
